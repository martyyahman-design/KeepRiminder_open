name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # GitHubのUIから手動実行を可能にする

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/node-setup@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run export:web
        env:
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}

      - name: Deploy to Public Repo
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          repository-name: martyyahman-design/KeepRiminder_open
          branch: main # 公開リポジトリのデプロイ先ブランチ
          token: ${{ secrets.DEPLOY_TOKEN }}
          clean: true
